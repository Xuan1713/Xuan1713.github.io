<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xuan1713的主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 这里保持你原来的所有 CSS 不变，为了节省篇幅省略，你用原来的就行 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* ... 你的完整 CSS ... */
    </style>
    <base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="greeting">HI！这里是Xuan1713的主页</h1>
            <p class="subtitle">做的有些潦草，但是又不是不能用😉</p>
            <p class="subtitle">会持续优化的</p>
        </div>

        <div class="announcement">
            <i class="fas fa-bullhorn announcement-icon"></i>
            <div class="announcement-content">
                <div class="announcement-title">公告</div>
                <div class="announcement-text">当前没有公告</div>
            </div>
        </div>

        <div class="time-card">
            <div class="time-display" id="current-time">00:00:00</div>
            <div class="date-display" id="current-date">加载中...</div>
        </div>

        <div class="works-section">
            <h2 class="section-title">
                <i class="fas fa-code"></i>
                我的作品
            </h2>
            <div class="work-buttons" id="work-buttons">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载作品中...</div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Xuan1713. 保留所有权利.</p>
            <p>所有项目均已部署于 GitHub Pages</p>
            <p id="homepage-version">当前主页版本：加载中...</p>
            <a href="https://github.com/Xuan1713" class="github-link" target="_blank">
                <i class="fab fa-github"></i>
                访问我的 GitHub
            </a>
        </div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="fas fa-moon theme-icon" id="themeIcon"></i>
    </button>
    <div class="toast-container" id="toast-container"></div>
    <div class="modal-overlay" id="changelog-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-history"></i> 更新日志</h3>
                <button class="modal-close" id="close-changelog">&times;</button>
            </div>
            <div class="modal-body" id="changelog-content"></div>
        </div>
    </div>

    <script>
        // Toast 函数
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { info: 'fas fa-info-circle', success: 'fas fa-check-circle', warning: 'fas fa-exclamation-triangle', error: 'fas fa-times-circle' };
            toast.innerHTML = `<div class="toast-icon"><i class="${icons[type] || icons.info}"></i></div><div class="toast-message">${message}</div><button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
        }

        // 全局数据
        let projectsData = [];
        let homepageData = null;

        // 加载并渲染
        async function loadProjects() {
            try {
                const response = await fetch('projects.json?v=' + Date.now());
                if (!response.ok) throw new Error('无法加载 projects.json');
                const data = await response.json();
                projectsData = data.projects || [];
                homepageData = data.homepage || null;
                
                // 更新主页版本
                if (homepageData && homepageData.version) {
                    const verEl = document.getElementById('homepage-version');
                    if (verEl) verEl.textContent = `当前主页版本：${homepageData.version}`;
                }
                
                renderProjects(); // 调用渲染函数
            } catch (error) {
                document.getElementById('work-buttons').innerHTML = '<div class="loading">加载失败，请刷新</div>';
                showToast('加载失败: ' + error.message, 'error');
            }
        }

        // 渲染作品列表（这个函数必须存在）
        function renderProjects() {
            const container = document.getElementById('work-buttons');
            if (!container) return;
            if (!projectsData.length) {
                container.innerHTML = '<div class="loading">暂无作品</div>';
                return;
            }
            
            let html = '';
            for (const p of projectsData) {
                const isDisabled = p.url === '#';
                const disabledClass = isDisabled ? 'disabled' : '';
                const target = isDisabled ? '' : 'target="_blank"';
                const versionText = `${p.version || '开发中'}${p.date ? ' | ' + p.date : ''}`;
                const tagsHtml = (p.tags || []).map(t => `<span class="work-tag">${escapeHtml(t)}</span>`).join('');
                
                html += `
                    <a href="${p.url}" class="work-btn ${disabledClass}" ${target} data-id="${p.id}">
                        <div class="work-icon"><i class="fas ${p.icon || 'fa-code'}"></i></div>
                        <div class="work-info">
                            <div class="work-header">
                                <div class="work-title">${escapeHtml(p.title)}</div>
                                <div class="work-version" data-id="${p.id}">${escapeHtml(versionText)}</div>
                            </div>
                            <div class="work-desc">${escapeHtml(p.description || '暂无描述')}</div>
                            <div class="work-tags">${tagsHtml}</div>
                        </div>
                        <div class="work-arrow"><i class="fas fa-chevron-right"></i></div>
                    </a>
                `;
            }
            container.innerHTML = html;
            
            // 绑定版本点击事件
            document.querySelectorAll('.work-version').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    const id = el.getAttribute('data-id');
                    const project = projectsData.find(p => p.id === id);
                    if (project && project.changelog) showChangelog(project);
                    else showToast('无更新日志', 'info');
                });
            });
            
            // 禁用链接处理
            document.querySelectorAll('.work-btn.disabled').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    showToast('该项目正在规划中，敬请期待！', 'info');
                });
            });
        }
        
        function showChangelog(project) {
            const modal = document.getElementById('changelog-modal');
            const content = document.getElementById('changelog-content');
            let html = `<div class="project-info"><h4>${escapeHtml(project.title)}</h4><p>${escapeHtml(project.description || '')}</p></div><div class="changelog-list">`;
            [...project.changelog].reverse().forEach(item => {
                html += `<div class="changelog-item"><div class="changelog-header"><div class="changelog-version">${escapeHtml(item.version)}</div><div class="changelog-date">${escapeHtml(item.date)}</div></div><div class="changelog-content">${item.content}</div></div>`;
            });
            html += '</div>';
            content.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        function showHomepageChangelog() {
            if (!homepageData || !homepageData.changelog) { showToast('无主页更新日志', 'info'); return; }
            const modal = document.getElementById('changelog-modal');
            const content = document.getElementById('changelog-content');
            let html = `<div class="project-info"><h4>Xuan1713的个人主页</h4><p>个人作品展示页</p></div><div class="changelog-list">`;
            [...homepageData.changelog].reverse().forEach(item => {
                html += `<div class="changelog-item"><div class="changelog-header"><div class="changelog-version">${escapeHtml(item.version)}</div><div class="changelog-date">${escapeHtml(item.date)}</div></div><div class="changelog-content">${item.content}</div></div>`;
            });
            html += '</div>';
            content.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        function closeModal() { document.getElementById('changelog-modal').style.display = 'none'; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        // 时钟
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeIcon.className = `theme-icon fas ${isDark ? 'fa-sun' : 'fa-moon'}`;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            showToast(isDark ? '已切换到暗色模式' : '已切换到亮色模式', 'success');
        });
        
        // 模态框关闭
        document.getElementById('close-changelog').addEventListener('click', closeModal);
        document.getElementById('changelog-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'h' || e.key === 'H') showHomepageChangelog(); });
        
        // 启动
        updateTime();
        setInterval(updateTime, 1000);
        loadProjects();
    </script>
</body>
</html>
